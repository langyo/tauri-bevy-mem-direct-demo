<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Panel</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="topbar">
    <div id="brand">Demo</div>
    <div id="status">○ 未连接</div>
    <div id="metrics">
      <span id="js-fps-display">JS: --</span>
      <span id="renderer-fps-display">Bevy: --</span>
      <span id="resolution-display">--x--</span>
      <span id="clock-display">--:--:--</span>
    </div>
  </div>

  <canvas id="bevy-canvas"></canvas>

  <aside id="panel"></aside>

  <div id="res-toolbar">
    <button data-resolution="native">Native</button>
    <button data-resolution="1024x768">1024x768</button>
    <button data-resolution="1280x720">1280x720</button>
    <button data-resolution="1920x1080">1920x1080</button>
    <button data-resolution="2560x1440">2560x1440</button>
    <button data-resolution="3840x2160">3840x2160</button>
  </div>

  <script src="./main.js"></script>
</body>
</html>
